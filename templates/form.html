<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Marks Calculator</title>
</head>

<body>

    <h1>Calculate Average Marks</h1>

    <form action="/form" method="POST">

        <label for="math">Math Marks:</label>
        <input type="number" id="math" name="math" step="any" required>

        <br><br>

        <label for="science">Science Marks:</label>
        <input type="number" id="science" name="science" step="any" required>

        <br><br>

        <label for="history">History Marks:</label>
        <input type="number" id="history" name="history" step="any" required>

        <br><br>

        <input type="submit" value="Calculate Average">

    </form>

    {% if score is defined %}
        <h2>Your Average Marks: {{ score }}</h2>
    {% endif %}

</body>
</html>
